<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simrik Jutta Udhyog</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    min-height:100vh;
    background:url('https://cdn.jsdelivr.net/gh/kuki-kat/simrik@main/Shoes_image/WaraqAfter-HoursEnsemble-BambooSocks2.jpeg') center/cover fixed;
    color:white;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.08);
    z-index:1000;
}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{color:white;text-decoration:none;}

.cart-btn{
    background:#4da6ff;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}
.hero h1{font-size:50px;}

/* PRODUCTS */
.products{padding:80px 20px;text-align:center;}
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:1100px;
    margin:auto;
}
.product-card{
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}
.product-card:hover{transform:translateY(-5px);}
.product-card img{width:100%;height:180px;object-fit:cover;}
.add-to-cart{
    margin:10px;
    padding:10px;
    background:#4da6ff;
    border:none;
    color:white;
    cursor:pointer;
}

/* GALLERY */
.gallery{padding:80px 20px;text-align:center;}
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}
.gallery-grid img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.gallery-grid img:hover{transform:scale(1.05);}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}
.lightbox img{max-width:90%;max-height:90%;}

/* CONTACT */
.contact{text-align:center;padding:80px 20px;}

/* SOCIAL EFFECT */
.contact-social{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}
.contact-social a{
    display:flex;
    align-items:center;
    gap:8px;
    background:white;
    color:#333;
    padding:10px 18px;
    border-radius:30px;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
}
.contact-social a i{transition:0.3s;}
.contact-social a:hover{
    transform:translateY(-3px) scale(1.05);
    color:white;
}
.contact-social a:nth-child(1):hover{background:#25D366;}
.contact-social a:nth-child(2):hover{background:#1877F2;}
.contact-social a:nth-child(3):hover{background:#E4405F;}
.contact-social a:hover i{
    transform:rotate(10deg) scale(1.2);
}

/* CART */
#cart-modal{
    position:fixed;
    right:-350px;
    top:0;
    width:300px;
    height:100%;
    background:#111;
    padding:20px;
    transition:0.3s;
}

/* FOOTER */
.footer{text-align:center;padding:20px;}
</style>
</head>

<body>

<header class="header">
<div>Simrik Jutta Udhyog</div>

<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#products">Shop</a></li>
<li><a href="#gallery">Photos</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</button>
</header>

<!-- HERO -->
<section class="hero" id="home">
<div>
<h1>Simrik Jutta Udhyog</h1>
<h2>Premium Leather Shoes</h2>
<p>Made in Nepal 🇳🇵</p>
</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
<h2>Our Shoes</h2>
<div class="products-grid" id="products-grid"></div>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
<h2>Our Collection</h2>
<div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
<img id="lightbox-img">
</div>

<!-- CONTACT -->
<section class="contact" id="contact">
<h2>Contact Us</h2>

<div class="contact-social">
<a href="https://wa.me/9779827068007" target="_blank">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</a>

<a href="https://www.facebook.com/profile.php?id=61586083700477">
<i class="fa-brands fa-facebook-f"></i> Facebook
</a>

<a href="#">
<i class="fa-brands fa-instagram"></i> Instagram
</a>
</div>
</section>

<!-- CART -->
<div id="cart-modal">
<h2>Your Cart</h2>
<div id="cart-items"></div>
<h3>Total: Rs. <span id="cart-total">0</span></h3>
<button onclick="toggleCart()">Close</button>
</div>

<footer class="footer">
© 2024 Simrik Jutta Udhyog
</footer>

<script>
let cart=[];

/* CART */
function toggleCart(){
    const m=document.getElementById("cart-modal");
    m.style.right = m.style.right==="0px" ? "-350px" : "0px";
}

function addToCart(name,price){
    cart.push({name,price});
    updateCart();
}

function updateCart(){
    let items=document.getElementById("cart-items");
    let total=0;
    items.innerHTML="";

    cart.forEach((item,i)=>{
        total+=item.price;
        items.innerHTML+=`
        <div>
        ${item.name} - Rs.${item.price}
        <button onclick="removeItem(${i})">❌</button>
        </div>`;
    });

    document.getElementById("cart-count").innerText=cart.length;
    document.getElementById("cart-total").innerText=total;
}

function removeItem(i){
    cart.splice(i,1);
    updateCart();
}

/* PRODUCTS */
const products=[
{name:"Leather Boot",price:2500,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Casual Shoe",price:1800,img:"https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77"},
{name:"Formal Shoe",price:2200,img:"https://images.unsplash.com/photo-1519741497674-611481863552"}
];

const grid=document.getElementById("products-grid");

products.forEach(p=>{
    grid.innerHTML+=`
    <div class="product-card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>Rs.${p.price}</p>
        <button class="add-to-cart" onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
    </div>`;
});

/* GALLERY */
const gallery=[
"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
"https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77",
"https://images.unsplash.com/photo-1519741497674-611481863552"
];

const g=document.getElementById("gallery-grid");

gallery.forEach(img=>{
    g.innerHTML+=`<img src="${img}" onclick="openImg('${img}')">`;
});

function openImg(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=src;
}
</script>

</body>
</html>
