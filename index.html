<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simrik Jutta Udhyog</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- WhatsApp Floating Button -->
<a href="https://wa.me/9779827068007" target="_blank" id="whatsapp-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>

<style>
#whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 3000;
}

#whatsapp-btn img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

#whatsapp-btn img:hover {
    transform: scale(1.1);
}
</style>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

/* BACKGROUND */
body {
    min-height: 100vh;
    background: url('https://cdn.jsdelivr.net/gh/kuki-kat/simrik@main/Shoes_image/WaraqAfter-HoursEnsemble-BambooSocks2.jpeg') center/cover fixed;
    color: white;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.08);
    z-index: 1000;
}

.logo {
    font-size: 20px;
    font-weight: 700;
}

.nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 500;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    font-weight: 700;
}

.hero p {
    margin-top: 10px;
    opacity: 0.8;
}

/* SECTIONS */
section {
    padding: 80px 20px;
}

/* PRODUCTS */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 20px;
    max-width: 1100px;
    margin: auto;
}

.product-card {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.product-card h3 {
    padding: 10px;
}

.product-price {
    padding: 0 10px;
    color: #4da6ff;
    font-weight: 600;
}

.add-to-cart {
    width: 90%;
    margin: 10px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: #4da6ff;
    color: white;
    cursor: pointer;
}

/* CONTACT */
.contact {
    text-align: center;
    backdrop-filter: blur(10px);
}

/* CART */
#cart-modal {
    position: fixed;
    top: 0;
    right: -400px;
    width: 320px;
    height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    padding: 20px;
    transition: 0.3s;
    z-index: 2000;
    overflow-y: auto;
}

/* BUTTON */
.cart-btn {
    background: #4da6ff;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}

.footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<header class="header">
<div class="logo">Simrik Jutta Udhyog</div>

<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#products">Shop</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</button>
</header>

<section class="hero" id="home">
<div>
<h1>Simrik Jutta Udhyog
<h2>Premium Leather Shoes</h2>
<p>Handcrafted in Nepal 🇳🇵</p>
</div>
</section>

<section id="products">
<h2 style="text-align:center;margin-bottom:30px;">Our Collection</h2>
<div class="products-grid" id="products-grid"></div>
</section>

<div id="cart-modal">
<h2>Your Cart</h2>
<div id="cart-items"></div>
<h3>Total: $<span id="cart-total">0</span></h3>
<button onclick="toggleCart()" class="cart-btn">Close</button>
</div>

<section class="contact" id="contact">
<h2>Contact Us</h2>
<p>📞 +977-9827068007</p>
</section>

<footer class="footer">
© 2024 Simrik Jutta Udhyog
</footer>

<script>
let cart = [];

function toggleCart(){
    const modal = document.getElementById("cart-modal");
    modal.style.right = modal.style.right === "0px" ? "-400px" : "0px";
}

function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

function updateCart(){
    const items = document.getElementById("cart-items");
    const totalEl = document.getElementById("cart-total");

    items.innerHTML = "";
    let total = 0;

    cart.forEach((item,index)=>{
        total += item.price;
        items.innerHTML += `
        <div style="margin-bottom:10px;">
            ${item.name} - $${item.price}
            <button onclick="removeItem(${index})">❌</button>
        </div>`;
    });

    document.getElementById("cart-count").textContent = cart.length;
    totalEl.textContent = total;
}

function removeItem(index){
    cart.splice(index,1);
    updateCart();
}

const products = [
{name:"New Shoes",price:120,img:"https://cdn.jsdelivr.net/gh/kuki-kat/simrik@main/Shoes_image/1771241812005.jpeg"},
{name:"Derby Shoe",price:140,img:"https://images.unsplash.com/photo-1528701800489-20be3c52c06b"},
{name:"Loafer",price:100,img:"https://images.unsplash.com/photo-1608256246200-53e635b5b65f"},
{name:"Sneaker",price:90,img:"https://images.unsplash.com/photo-1519741497674-611481863552"}
];

const grid = document.getElementById("products-grid");

products.forEach(p=>{
grid.innerHTML += `
<div class="product-card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="product-price">$${p.price}</p>
<button class="add-to-cart" onclick="addToCart('${p.name}',${p.price})">
Add to Cart
</button>
</div>`;
});
</script>

</body>
</html>
