<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simrik Jutta Udhyog - Premium Leather Shoes Nepal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4da6ff;
    --dark: #1a1a1a;
    --light: #f8f9fa;
    --shadow: 0 10px 30px rgba(0,0,0,0.1);
}

* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:'Inter',sans-serif;background:var(--light);}

/* HEADER */
.header {position:fixed;width:100%;background:white;box-shadow:var(--shadow);z-index:1000;}
.nav {display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;}
.logo {font-size:1.5rem;font-weight:700;color:var(--primary);}
.nav-links {display:flex;gap:2rem;list-style:none;}
.cart-btn {background:var(--primary);color:white;padding:0.5rem 1rem;border:none;border-radius:20px;cursor:pointer;}

/* HERO */
.hero {height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(rgba(0,0,0,0.6),rgba(77,166,255,0.3)),url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519') center/cover;color:white;text-align:center;}
.btn {padding:10px 20px;background:white;color:var(--primary);border-radius:20px;text-decoration:none;}

/* PRODUCTS */
.products {padding:6rem 2rem;}
.products-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;}
.product-card {background:white;padding:1rem;border-radius:10px;box-shadow:var(--shadow);}
.product-card img {width:100%;height:200px;object-fit:cover;}
.product-price {color:var(--primary);font-weight:bold;}
.add-to-cart {width:100%;padding:8px;background:var(--primary);color:white;border:none;border-radius:20px;margin-top:10px;cursor:pointer;}

/* CART */
#cart-modal {
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:2000;
overflow-y:auto;
}

/* CONTACT */
.contact {text-align:center;padding:4rem;}

/* FOOTER */
.footer {background:#1a1a1a;color:white;text-align:center;padding:2rem;}
</style>
</head>

<body>

<header class="header">
<nav class="nav">
<h2 class="logo">Simrik Jutta</h2>
<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#products">Shop</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</button>
</nav>
</header>

<section class="hero" id="home">
<div>
<h1>Simrik Jutta Udhyog</h1>
<p>Premium Leather Shoes from Nepal</p>
<a href="#products" class="btn">Shop Now</a>
</div>
</section>

<section class="products" id="products">
<h2>Our Shoes</h2><br>
<div class="products-grid" id="products-grid"></div>
</section>

<div class="product-card">
    <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772">
    <h3>Oxford Shoe</h3>
    <p class="product-price">$120</p>

    <a href="https://wa.me/9779827068007?text=Hi, I want to order Oxford Shoe ($120)"
       target="_blank"
       style="display:block;text-align:center;background:#25D366;color:white;padding:10px;border-radius:20px;text-decoration:none;margin-top:10px;">
       Order on WhatsApp
    </a>
</div>

<!-- CART -->
<div id="cart-modal">
<h2>Your Cart</h2>
<div id="cart-items"></div>
<h3>Total: $<span id="cart-total">0</span></h3>
<button onclick="toggleCart()">Close</button>
</div>

<section class="contact" id="contact">
<h2>Contact Us</h2>
<p>📞 Phone: <strong id="phone">Click to reveal</strong></p>
<button onclick="showPhone()" class="btn">Show Phone</button>
<br><br>
<a href="tel:+9779827068007" class="btn">Call Now</a>
</section>

<footer class="footer">
<p>© 2024 Simrik Jutta Udhyog | Nepal</p>
</footer>

<script>
let cart = [];

// TOGGLE CART
function toggleCart(){
    const modal = document.getElementById("cart-modal");
    modal.style.right = modal.style.right === "0px" ? "-400px" : "0px";
}

// ADD TO CART
function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

// UPDATE CART
function updateCart(){
    const items = document.getElementById("cart-items");
    const totalEl = document.getElementById("cart-total");

    items.innerHTML = "";
    let total = 0;

    cart.forEach((item,index)=>{
        total += item.price;
        items.innerHTML += `
        <div>
            ${item.name} - $${item.price}
            <button onclick="removeItem(${index})">❌</button>
        </div>`;
    });

    document.getElementById("cart-count").textContent = cart.length;
    totalEl.textContent = total;
}

// REMOVE ITEM
function removeItem(index){
    cart.splice(index,1);
    updateCart();
}

// PHONE
function showPhone(){
    document.getElementById('phone').textContent = '+977-9827068007';
}

// PRODUCTS
const products = [
{name:"New shoes", price:120, img:"https://raw.githubusercontent.com/kuki-kat/simrik/main/Shoes_image/1771241812005.jpeg"},
{name:"Derby Shoe",price:140,img:"https://images.unsplash.com/photo-1528701800489-20be3c52c06b"},
{name:"Loafer",price:100,img:"https://images.unsplash.com/photo-1608256246200-53e635b5b65f"},
{name:"Sneaker",price:90,img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{name:"Boot",price:180,img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{name:"Formal Black",price:150,img:"https://images.unsplash.com/photo-1531310197839-ccf54634509e"},
{name:"Casual Shoe",price:80,img:"https://images.unsplash.com/photo-1520256862855-398228c41684"},
{name:"Leather Sandal",price:70,img:"https://images.unsplash.com/photo-1582582621959-48d27397dc69"},
{name:"Sport Shoe",price:110,img:"https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77"},
{name:"Classic Brown",price:130,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"}
];

const grid = document.getElementById("products-grid");

products.forEach(p=>{
    grid.innerHTML += `
    <div class="product-card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p class="product-price">$${p.price}</p>
        <button class="add-to-cart" onclick="addToCart('${p.name}', ${p.price})">
        Add to Cart
        </button>
    </div>`;
});
</script>

</body>
</html>
